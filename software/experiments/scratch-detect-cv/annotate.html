<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Scratch annotator</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #111; color: #eee;
               font-family: system-ui, -apple-system, sans-serif; }
  header { padding: 12px 16px; display: flex; gap: 12px; align-items: center;
           background: #1a1a1a; border-bottom: 1px solid #333; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .spacer { flex: 1; }
  button { background: #333; color: #fff; border: 1px solid #555;
           padding: 6px 12px; border-radius: 4px; cursor: pointer;
           font-size: 13px; }
  button:hover { background: #444; }
  button.primary { background: #c33; border-color: #f44; }
  button.primary:hover { background: #d44; }
  #counter { font-variant-numeric: tabular-nums; color: #c33; font-weight: 600; }
  #drop { margin: 40px auto; max-width: 600px; padding: 60px;
          border: 2px dashed #555; border-radius: 8px; text-align: center;
          color: #888; }
  #drop.drag { border-color: #c33; color: #eee; background: #222; }
  #stage { position: relative; display: inline-block; margin: 16px; }
  #img { display: block; max-width: 100%; user-select: none; -webkit-user-drag: none; }
  #canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
  #hint { padding: 8px 16px; color: #888; font-size: 12px; }
  kbd { background: #222; border: 1px solid #444; border-radius: 3px;
        padding: 1px 6px; font-size: 11px; }
</style>
</head>
<body>

<header>
  <h1>Scratch annotator</h1>
  <span id="counter">0 marks</span>
  <span class="spacer"></span>
  <button id="loadBtn">Load image</button>
  <button id="undoBtn">Undo</button>
  <button id="clearBtn">Clear all</button>
  <button id="saveBtn" class="primary">Save annotated PNG</button>
  <button id="saveJsonBtn">Save JSON</button>
  <input type="file" id="fileInput" accept="image/*" style="display:none" />
</header>

<div id="hint">
  <kbd>Drag</kbd> to draw a box.
  <kbd>Click</kbd> an existing box to remove it.
  <kbd>Z</kbd> undo,
  <kbd>Esc</kbd> cancel current draw.
</div>

<div id="drop">
  Drop an image here, or click <b>Load image</b>.
</div>

<div id="stage" style="display:none">
  <img id="img" />
  <canvas id="canvas"></canvas>
</div>

<script>
const img      = document.getElementById('img');
const canvas   = document.getElementById('canvas');
const stage    = document.getElementById('stage');
const drop     = document.getElementById('drop');
const ctx      = canvas.getContext('2d');
const counter  = document.getElementById('counter');
const fileInput = document.getElementById('fileInput');

let boxes = [];          // {x, y, w, h}
let drag = null;         // {x0, y0, x1, y1} while mouse is down
let imgName = 'image';

function updateCounter() {
  counter.textContent = boxes.length + ' mark' + (boxes.length === 1 ? '' : 's');
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#ff2d2d';
  for (const b of boxes) {
    ctx.strokeRect(b.x, b.y, b.w, b.h);
  }
  if (drag) {
    const b = normRect(drag);
    ctx.strokeStyle = '#ffa500';
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(b.x, b.y, b.w, b.h);
    ctx.setLineDash([]);
  }
}

function normRect(d) {
  return {
    x: Math.min(d.x0, d.x1),
    y: Math.min(d.y0, d.y1),
    w: Math.abs(d.x1 - d.x0),
    h: Math.abs(d.y1 - d.y0),
  };
}

function pointInBox(px, py, b) {
  return px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h;
}

function eventXY(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (canvas.width / r.width),
    y: (e.clientY - r.top)  * (canvas.height / r.height),
  };
}

canvas.addEventListener('mousedown', (e) => {
  const { x, y } = eventXY(e);
  // Click on an existing box to remove it — only if it's a real click
  // (we'll resolve this on mouseup if the user didn't drag)
  drag = { x0: x, y0: y, x1: x, y1: y };
});

canvas.addEventListener('mousemove', (e) => {
  if (!drag) return;
  const { x, y } = eventXY(e);
  drag.x1 = x;
  drag.y1 = y;
  draw();
});

canvas.addEventListener('mouseup', (e) => {
  if (!drag) return;
  const { x, y } = eventXY(e);
  drag.x1 = x;
  drag.y1 = y;
  const r = normRect(drag);
  drag = null;
  if (r.w < 3 && r.h < 3) {
    // Treat as click: remove any box under the cursor
    for (let i = boxes.length - 1; i >= 0; i--) {
      if (pointInBox(x, y, boxes[i])) {
        boxes.splice(i, 1);
        break;
      }
    }
  } else {
    boxes.push(r);
  }
  updateCounter();
  draw();
});

window.addEventListener('keydown', (e) => {
  if (e.key === 'z' || e.key === 'Z') {
    boxes.pop();
    updateCounter();
    draw();
  } else if (e.key === 'Escape') {
    drag = null;
    draw();
  }
});

function loadImage(file) {
  imgName = file.name.replace(/\.[^.]+$/, '');
  const url = URL.createObjectURL(file);
  img.onload = () => {
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.style.width  = img.width + 'px';
    canvas.style.height = img.height + 'px';
    stage.style.display = 'inline-block';
    drop.style.display  = 'none';
    boxes = [];
    updateCounter();
    draw();
  };
  img.src = url;
}

// Drop-target wiring
['dragenter','dragover'].forEach(ev => {
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); });
});
['dragleave','drop'].forEach(ev => {
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); });
});
drop.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) loadImage(f);
});
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && !stage.style.display.startsWith('inline')) loadImage(f);
});

document.getElementById('loadBtn').onclick = () => fileInput.click();
fileInput.onchange = e => { const f = e.target.files[0]; if (f) loadImage(f); };

document.getElementById('undoBtn').onclick = () => {
  boxes.pop(); updateCounter(); draw();
};
document.getElementById('clearBtn').onclick = () => {
  if (!confirm('Clear all boxes?')) return;
  boxes = []; updateCounter(); draw();
};

document.getElementById('saveBtn').onclick = () => {
  const out = document.createElement('canvas');
  out.width = canvas.width;
  out.height = canvas.height;
  const octx = out.getContext('2d');
  octx.drawImage(img, 0, 0);
  octx.lineWidth = 2;
  octx.strokeStyle = '#ff2d2d';
  for (const b of boxes) octx.strokeRect(b.x, b.y, b.w, b.h);
  octx.font = '20px system-ui, sans-serif';
  octx.fillStyle = '#ff2d2d';
  octx.fillText(boxes.length + ' scratch marks', 10, out.height - 12);
  const a = document.createElement('a');
  a.href = out.toDataURL('image/png');
  a.download = imgName + '_annotated.png';
  a.click();
};

document.getElementById('saveJsonBtn').onclick = () => {
  const payload = {
    image: imgName,
    width: canvas.width,
    height: canvas.height,
    boxes: boxes.map(b => ({
      x: Math.round(b.x), y: Math.round(b.y),
      w: Math.round(b.w), h: Math.round(b.h),
    })),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = imgName + '_annotations.json';
  a.click();
};
</script>
</body>
</html>
